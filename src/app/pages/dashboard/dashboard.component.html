<div class="d-flex vh-100">
  <!-- Sidebar -->
  <div class="d-flex flex-column flex-shrink-0 p-3 bg-light" style="width: 280px; height: 100vh;">
    <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none">
      <svg class="bi me-2" width="40" height="32"><use xlink:href="#bootstrap"></use></svg>
      <span class="fs-4">Bienvenido</span>
    </a>
    <hr>
    <ul class="nav nav-pills flex-column mb-auto">
      <li class="nav-item">
        <a href="#" class="nav-link active" aria-current="page">
          <svg class="bi me-2" width="16" height="16"><use xlink:href="#home"></use></svg>
          Mi perfil
        </a>
      </li>
      <li>
        <a class="nav-link link-dark" (click)="openMulticotizador()">Multicotizador</a>
      </li>
      <li>
        <a href="#" class="nav-link link-dark">
          <svg class="bi me-2" width="16" height="16"><use xlink:href="#table"></use></svg>
          Emitir pólizas
        </a>
      </li>
      <li>
        <a href="#" class="nav-link link-dark">
          <svg class="bi me-2" width="16" height="16"><use xlink:href="#grid"></use></svg>
          Ver productos
        </a>
      </li>
      <li>
        <a href="#" class="nav-link link-dark" (click)="logout()">
          <svg class="bi me-2" width="16" height="16"><use xlink:href="#people-circle"></use></svg>
          Cerrar sesión
        </a>
      </li>
    </ul>
    <hr>
  </div>

  <!-- Contenido principal -->
  <div class="flex-grow-1 p-4">
    <div *ngIf="multicotizador">
      <app-multicotizador></app-multicotizador>
    </div>
    <div *ngIf="!multicotizador">
      <h2>Bienvenido al portal</h2>
      <p>Selecciona una opción del menú.</p>
    </div>
  </div>
</div>
